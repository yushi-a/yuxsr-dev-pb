version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/yuxsr/yuxsr_dev_pb/gencode/go
plugins:
  - remote: buf.build/protocolbuffers/go:v1.31.0
    out: gencode/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: gencode/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - remote: buf.build/bufbuild/es:v2.9.0
    opt: target=ts
    out: gencode/ts
  - remote: buf.build/connectrpc/es:v1.6.1
    opt: target=ts
    out: gencode/ts
inputs:
  - directory: proto
